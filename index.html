<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Comunicatore CAA Davide</title>
    
    <!-- Configurazione per rendere l'app installabile (PWA) -->
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="manifest" href="manifest.json">

    <!-- Caricamento librerie grafiche -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <meta name="apple-mobile-web-app-title" content="CAA Davide">
    <meta name="application-name" content="CAA Davide">
    <meta name="mobile-web-app-capable" content="yes">
    
    <style>
        /* Ottimizzazioni per il touch e per evitare selezioni di testo fastidiose */
        body { 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
            user-select: none;
            -webkit-user-select: none;
            overscroll-behavior-y: contain; /* Evita il pull-to-refresh fastidioso */
        }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 1rem; 
        }
        @media (max-width: 640px) { 
            .grid-container { grid-template-columns: repeat(2, 1fr); } 
        }
        .symbol-card { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer;
        }
        .symbol-card:active { 
            transform: scale(0.92); 
            filter: brightness(0.9); 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        /* Registrazione Service Worker per abilitare l'installazione su Chrome */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrato con successo'))
                    .catch(err => console.log('Errore registrazione Service Worker:', err));
            });
        }

        /* Componente per le icone che si aggiorna correttamente */
        const Icon = ({ name, color }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} className={`w-14 h-14 ${color}`}></i>;
        };

        /* Definizione dei simboli CAA */
        const SYMBOLS = [
            { id: 'stare', label: 'STARE', icon: 'arrow-down', iconColor: 'text-slate-700', color: 'border-blue-400', translations: { en: 'Stay', ar: 'بقاء' } },
            { id: 'aprire', label: 'APRIRE', icon: 'door-open', iconColor: 'text-amber-700', color: 'border-red-500', translations: { en: 'Open', ar: 'فتح' } },
            { id: 'aiutami', label: 'AIUTAMI', icon: 'hand-helping', iconColor: 'text-orange-500', color: 'border-red-500', translations: { en: 'Help me', ar: 'ساعدني' } },
            { id: 'mettere', label: 'METTERE', icon: 'box', iconColor: 'text-orange-600', color: 'border-gray-500', translations: { en: 'Put', ar: 'وضع' } },
            { id: 'in', label: 'IN', icon: 'map-pin', iconColor: 'text-slate-500', color: 'border-slate-300', translations: { en: 'In', ar: 'في' } },
            { id: 'adesso', label: 'ADESSO', icon: 'clock', iconColor: 'text-gray-700', color: 'border-red-500', translations: { en: 'Now', ar: 'الآن' } },
            { id: 'dopo', label: 'DOPO', icon: 'arrow-right', iconColor: 'text-gray-700', color: 'border-green-500', translations: { en: 'After', ar: 'بعد' } },
            { id: 'casa', label: 'CASA', icon: 'home', iconColor: 'text-red-500', color: 'border-slate-400', translations: { en: 'Home', ar: 'منزل' } },
            { id: 'acqua', label: 'ACQUA', icon: 'droplets', iconColor: 'text-blue-500', color: 'border-red-500', translations: { en: 'Water', ar: 'ماء' } },
            { id: 'dentista', label: 'DENTISTA', icon: 'stethoscope', iconColor: 'text-blue-600', color: 'border-green-500', translations: { en: 'Dentist', ar: 'طبيب الأسنان' } },
            { id: 'montagna', label: 'MONTAGNA', icon: 'mountain', iconColor: 'text-teal-600', color: 'border-gray-500', translations: { en: 'Mountain', ar: 'جبل' } },
            { id: 'mi-piace', label: 'MI PIACE', icon: 'thumbs-up', iconColor: 'text-green-500', color: 'border-gray-500', translations: { en: 'I like it', ar: 'يعجبني' } },
            { id: 'non-mi-piace', label: 'NON MI PIACE', icon: 'thumbs-down', iconColor: 'text-red-500', color: 'border-black', translations: { en: "I don't like it", ar: 'لا يعجبني' } },
            { id: 'non-bravo', label: 'NON BRAVO', icon: 'user-x', iconColor: 'text-red-600', color: 'border-gray-500', translations: { en: 'Not good', ar: 'ليس جيداً' } },
            { id: 'non-toccare', label: 'NON TOCCARE', icon: 'ban', iconColor: 'text-pink-600', color: 'border-gray-500', translations: { en: "Don't touch", ar: 'لا تلمس' } },
        ];

        function App() {
            const [language, setLanguage] = useState('en');
            const [sentence, setSentence] = useState([]);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [showInstallBanner, setShowInstallBanner] = useState(false);

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setShowInstallBanner(true);
                });

                window.addEventListener('appinstalled', () => {
                    setShowInstallBanner(false);
                    setDeferredPrompt(null);
                    console.log('App installata!');
                });

                // Rileva se è già in modalità standalone
                if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
                    setShowInstallBanner(false);
                }
            }, []);

            const handleInstallClick = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('User accepted the install prompt');
                }
                setDeferredPrompt(null);
                setShowInstallBanner(false);
            };

            /* Funzione per la sintesi vocale gratuita del dispositivo */
            const speakText = (text) => {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = language === 'en' ? 'en-US' : 'ar-SA';
                utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            };

            /* Aggiunge una parola alla striscia della frase */
            const addToSentence = (symbol) => {
                if (sentence.length < 10) {
                    setSentence([...sentence, symbol]);
                    speakText(symbol.translations[language]);
                }
            };

            /* Legge l'intera frase composta */
            const playFullSentence = () => {
                if (sentence.length === 0) return;
                const fullText = sentence.map(s => s.translations[language]).join(' ');
                setIsSpeaking(true);
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(fullText);
                utterance.lang = language === 'en' ? 'en-US' : 'ar-SA';
                utterance.onend = () => setIsSpeaking(false);
                window.speechSynthesis.speak(utterance);
            };

            return (
                <div className="flex flex-col items-center min-h-screen pb-20">
                    {/* Banner Installazione */}
                    {showInstallBanner && (
                        <div className="w-full bg-blue-600 text-white p-3 flex justify-between items-center shadow-md animate-in slide-in-from-top duration-500">
                            <div className="flex items-center gap-3 ml-2">
                                <div className="p-1 bg-white/20 rounded-lg">
                                    <Icon name="download" color="text-white w-6 h-6" />
                                </div>
                                <span className="text-sm font-bold">Usa questa app senza browser!</span>
                            </div>
                            <div className="flex gap-2 mr-2">
                                <button 
                                    onClick={() => setShowInstallBanner(false)}
                                    className="px-3 py-1 text-xs opacity-70 font-bold uppercase"
                                >
                                    Dopo
                                </button>
                                <button 
                                    onClick={handleInstallClick}
                                    className="bg-white text-blue-600 px-4 py-2 rounded-xl text-xs font-black uppercase shadow-sm active:scale-95 transition-all"
                                >
                                    Installa Ora
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Barra Superiore per la costruzione della frase */}
                    <div className="w-full max-w-5xl bg-white border-b-4 border-slate-200 p-4 sticky top-0 z-50 shadow-sm flex items-center min-h-[140px]">
                        <div className="flex-1 flex flex-wrap gap-2 items-center min-h-[100px] overflow-y-auto px-2">
                            {sentence.length === 0 ? (
                                <div className="flex items-center gap-3 text-slate-300">
                                    <Icon name="message-square-plus" color="text-slate-200" />
                                    <span className="font-bold uppercase tracking-widest text-sm text-center">Tocca le immagini per parlare...</span>
                                </div>
                            ) : (
                                sentence.map((s, index) => (
                                    <div key={index} className="flex flex-col items-center p-2 bg-slate-50 border-2 border-slate-200 rounded-2xl scale-90 shadow-sm animate-in zoom-in">
                                        <Icon name={s.icon} color={s.iconColor} />
                                        <span className="text-[10px] font-black uppercase mt-1 truncate w-16 text-center">{s.label}</span>
                                    </div>
                                ))
                            )}
                        </div>
                        <div className="flex flex-col gap-3 ml-4">
                            <button 
                                onClick={playFullSentence} 
                                className="w-16 h-16 rounded-3xl bg-green-500 text-white shadow-lg flex items-center justify-center active:scale-90 disabled:opacity-50 transition-all"
                                title="Leggi tutto"
                            >
                                <Icon name="volume-2" color="text-white" />
                            </button>
                            <button 
                                onClick={() => setSentence([])} 
                                className="w-16 h-12 rounded-2xl bg-red-100 text-red-500 flex items-center justify-center active:scale-90 transition-all"
                                title="Cancella"
                            >
                                <Icon name="eraser" color="text-red-500" />
                            </button>
                        </div>
                    </div>

                    {/* Pannello di Controllo Lingua */}
                    <div className="w-full max-w-5xl px-4 py-8 flex flex-col gap-8">
                        <div className="flex justify-center">
                            <div className="flex bg-white p-1 rounded-3xl shadow-md border border-slate-200 w-full max-w-md">
                                <button 
                                    onClick={() => setLanguage('en')} 
                                    className={`flex-1 py-4 rounded-2xl font-black transition-all ${language === 'en' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}
                                >
                                    ENGLISH 🇺🇸
                                </button>
                                <button 
                                    onClick={() => setLanguage('ar')} 
                                    className={`flex-1 py-4 rounded-2xl font-black transition-all ${language === 'ar' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}
                                >
                                    العربية 🇦🇪
                                </button>
                            </div>
                        </div>

                        {/* Griglia dei Simboli CAA */}
                        <div className="grid-container">
                            {SYMBOLS.map((symbol) => (
                                <button 
                                    key={symbol.id} 
                                    onClick={() => addToSentence(symbol)} 
                                    className={`symbol-card flex flex-col items-center justify-center p-6 bg-white border-[6px] ${symbol.color} rounded-[3rem] shadow-sm hover:shadow-lg`}
                                >
                                    <Icon name={symbol.icon} color={symbol.iconColor} />
                                    <span className="text-sm font-black uppercase mt-4 tracking-tighter text-slate-800 leading-none">
                                        {symbol.label}
                                    </span>
                                </button>
                            ))}
                        </div>
                    </div>
                    
                    <footer className="mt-auto py-10 text-slate-300 font-bold text-[10px] uppercase tracking-[0.3em]">
                        Comunicatore CAA • Davide 
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
