<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Impostazioni per App a tutto schermo (Android e iOS) -->
    <meta name="theme-color" content="#3b82f6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CAA Davide">
    
    <title>Comunicatore CAA Davide</title>
    
    <!-- Icone -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/512/communication.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/communication.png">

    <!-- Manifest dinamico configurato specificamente per il progetto CAApp -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"Comunicatore CAA Davide","short_name":"CAA","start_url":"/CAApp/","scope":"/CAApp/","display":"standalone","orientation":"portrait","background_color":"#f8fafc","theme_color":"#3b82f6","icons":[{"src":"https://img.icons8.com/fluency/512/communication.png","sizes":"512x512","type":"image/png","purpose":"any maskable"}]}'>

    <!-- Librerie -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body { 
            background-color: #f8fafc;
            touch-action: manipulation; 
            margin: 0;
            padding: 0;
        }

        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 1rem; 
            padding: 1rem;
        }

        @media (max-width: 640px) { 
            .grid-container { grid-template-columns: repeat(2, 1fr); } 
        }

        .symbol-card { 
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            cursor: pointer;
        }

        .symbol-card:active { 
            transform: scale(0.94); 
            filter: brightness(0.9);
            box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .phrase-bar {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.95);
        }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        /* SERVICE WORKER: Necessario per far apparire il tasto "Installa" */
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => self.skipWaiting());
                self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', (e) => {});
            `;
            const blob = new Blob([swCode], {type: 'text/javascript'});
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(() => {});
        }

        const Icon = ({ name, color }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} className={`w-14 h-14 ${color}`}></i>;
        };

        const SYMBOLS = [
            { id: 'stare', label: 'STARE', icon: 'arrow-down', iconColor: 'text-slate-700', color: 'border-blue-400', translations: { en: 'Stay', ar: 'بقاء' } },
            { id: 'aprire', label: 'APRIRE', icon: 'door-open', iconColor: 'text-amber-700', color: 'border-red-500', translations: { en: 'Open', ar: 'فتح' } },
            { id: 'aiutami', label: 'AIUTAMI', icon: 'hand-helping', iconColor: 'text-orange-500', color: 'border-red-500', translations: { en: 'Help me', ar: 'ساعدني' } },
            { id: 'mettere', label: 'METTERE', icon: 'box', iconColor: 'text-orange-600', color: 'border-gray-500', translations: { en: 'Put', ar: 'وضع' } },
            { id: 'in', label: 'IN', icon: 'map-pin', iconColor: 'text-slate-500', color: 'border-slate-300', translations: { en: 'In', ar: 'في' } },
            { id: 'adesso', label: 'ADESSO', icon: 'clock', iconColor: 'text-gray-700', color: 'border-red-500', translations: { en: 'Now', ar: 'الآن' } },
            { id: 'dopo', label: 'DOPO', icon: 'arrow-right', iconColor: 'text-gray-700', color: 'border-green-500', translations: { en: 'After', ar: 'بعد' } },
            { id: 'casa', label: 'CASA', icon: 'home', iconColor: 'text-red-500', color: 'border-slate-400', translations: { en: 'Home', ar: 'منزل' } },
            { id: 'acqua', label: 'ACQUA', icon: 'droplets', iconColor: 'text-blue-500', color: 'border-red-500', translations: { en: 'Water', ar: 'ماء' } },
            { id: 'dentista', label: 'DENTISTA', icon: 'stethoscope', iconColor: 'text-blue-600', color: 'border-green-500', translations: { en: 'Dentist', ar: 'طبيب الأسنان' } },
            { id: 'montagna', label: 'MONTAGNA', icon: 'mountain', iconColor: 'text-teal-600', color: 'border-gray-500', translations: { en: 'Mountain', ar: 'جبل' } },
            { id: 'mi-piace', label: 'MI PIACE', icon: 'thumbs-up', iconColor: 'text-green-500', color: 'border-gray-500', translations: { en: 'I like it', ar: 'يعجبني' } },
            { id: 'non-mi-piace', label: 'NON MI PIACE', icon: 'thumbs-down', iconColor: 'text-red-500', color: 'border-black', translations: { en: "I don't like it", ar: 'لا يعجبني' } },
            { id: 'non-bravo', label: 'NON BRAVO', icon: 'user-x', iconColor: 'text-red-600', color: 'border-gray-500', translations: { en: 'Not good', ar: 'ليس جيداً' } },
            { id: 'non-toccare', label: 'NON TOCCARE', icon: 'ban', iconColor: 'text-pink-600', color: 'border-gray-500', translations: { en: "Don't touch", ar: 'لا تلمس' } },
        ];

        function App() {
            const [language, setLanguage] = useState('en');
            const [sentence, setSentence] = useState([]);

            const speakText = (text) => {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = language === 'en' ? 'en-US' : 'ar-SA';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            };

            const addToSentence = (symbol) => {
                if (sentence.length < 10) {
                    setSentence([...sentence, symbol]);
                    speakText(symbol.translations[language]);
                }
            };

            const playFullSentence = () => {
                if (sentence.length === 0) return;
                const fullText = sentence.map(s => s.translations[language]).join(' ');
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(fullText);
                utterance.lang = language === 'en' ? 'en-US' : 'ar-SA';
                window.speechSynthesis.speak(utterance);
            };

            return (
                <div className="flex flex-col items-center min-h-screen">
                    {/* Barra della frase */}
                    <div className="phrase-bar w-full max-w-5xl p-4 sticky top-0 z-50 flex items-center min-h-[150px] border-b border-slate-200">
                        <div className="flex-1 flex flex-wrap gap-2 items-center min-h-[100px] overflow-y-auto px-2">
                            {sentence.length === 0 ? (
                                <div className="flex items-center gap-4 text-slate-300 ml-2">
                                    <Icon name="message-circle" color="text-slate-200" />
                                    <span className="font-bold uppercase tracking-widest text-sm text-slate-300">Tocca i simboli...</span>
                                </div>
                            ) : (
                                sentence.map((s, index) => (
                                    <div key={index} className="flex flex-col items-center p-2 bg-white border-2 border-slate-100 rounded-3xl shadow-sm scale-95">
                                        <Icon name={s.icon} color={s.iconColor} />
                                        <span className="text-[10px] font-black uppercase mt-1 text-slate-500">{s.label}</span>
                                    </div>
                                ))
                            )}
                        </div>
                        <div className="flex flex-col gap-3 ml-4">
                            <button onClick={playFullSentence} className="w-16 h-16 rounded-[2rem] bg-green-500 text-white shadow-lg flex items-center justify-center active:scale-90 transition-all">
                                <Icon name="play" color="text-white" />
                            </button>
                            <button onClick={() => setSentence([])} className="w-16 h-12 rounded-2xl bg-red-50 text-red-400 flex items-center justify-center active:scale-90">
                                <Icon name="eraser" color="text-red-300" />
                            </button>
                        </div>
                    </div>

                    {/* Griglia e Lingue */}
                    <div className="w-full max-w-5xl px-4 py-8 space-y-8">
                        <div className="flex justify-center">
                            <div className="flex bg-white p-1 rounded-[2rem] shadow-sm border border-slate-200 w-full max-w-sm">
                                <button onClick={() => setLanguage('en')} className={`flex-1 py-4 rounded-3xl font-black text-xs transition-all ${language === 'en' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400'}`}>ENGLISH</button>
                                <button onClick={() => setLanguage('ar')} className={`flex-1 py-4 rounded-3xl font-black text-xs transition-all ${language === 'ar' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400'}`}>ARABO</button>
                            </div>
                        </div>

                        <div className="grid-container">
                            {SYMBOLS.map((symbol) => (
                                <button key={symbol.id} onClick={() => addToSentence(symbol)} className={`symbol-card flex flex-col items-center justify-center p-6 bg-white border-[6px] ${symbol.color} rounded-[3rem] shadow-sm`}>
                                    <Icon name={symbol.icon} color={symbol.iconColor} />
                                    <span className="text-sm font-black uppercase mt-4 text-slate-800 leading-none tracking-tight">{symbol.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
