<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Comunicatore CAA Davide</title>
    
    <!-- Configurazione per rendere l'app installabile (PWA) -->
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="manifest" href="manifest.json">

    <!-- Caricamento librerie grafiche -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <meta name="apple-mobile-web-app-title" content="CAA Davide">
    <meta name="application-name" content="CAA Davide">
    <meta name="mobile-web-app-capable" content="yes">
    
    <style>
        /* Ottimizzazioni per il touch e per evitare selezioni di testo fastidiose */
        body { 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
            user-select: none;
            -webkit-user-select: none;
            overscroll-behavior-y: contain; /* Evita il pull-to-refresh fastidioso */
        }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 1rem; 
        }
        @media (max-width: 640px) { 
            .grid-container { grid-template-columns: repeat(2, 1fr); } 
        }
        .symbol-card { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer;
        }
        .symbol-card:active { 
            transform: scale(0.92); 
            filter: brightness(0.9); 
        }

        /* Stile della barra di ricerca ARASAAC */
        .search-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: white;
            border: 3px solid #cbd5e1;
            border-radius: 1.5rem;
            padding: 0.5rem 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-bar:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e293b;
            background: transparent;
        }
        .search-bar input::placeholder {
            color: #94a3b8;
            font-weight: 600;
        }

        /* Animazione di caricamento */
        @keyframes pulse-dot {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        .loading-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #3b82f6;
            display: inline-block;
            margin: 0 4px;
            animation: pulse-dot 1.2s infinite ease-in-out;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        /* Immagine del pittogramma nella griglia */
        .pictogram-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 0.5rem;
        }

        /* Immagine del pittogramma nella striscia frase (più piccola) */
        .sentence-img {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }

        /* Animazione di apparizione per i risultati */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in-up {
            animation: fadeInUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        /* Registrazione Service Worker per abilitare l'installazione su Chrome */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrato con successo'))
                    .catch(err => console.log('Errore registrazione Service Worker:', err));
            });
        }

        /* Componente per le icone Lucide (usato solo per i simboli predefiniti e i pulsanti) */
        const Icon = ({ name, color }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} className={`w-14 h-14 ${color}`}></i>;
        };

        /* =====================================================================
           SIMBOLI PREDEFINITI (quelli originali con icone Lucide)
           Vengono mostrati quando la barra di ricerca è vuota.
           ===================================================================== */
        const DEFAULT_SYMBOLS = [
            { id: 'stare', label: 'STARE', icon: 'arrow-down', iconColor: 'text-slate-700', color: 'border-blue-400', translations: { en: 'Stay', ar: 'بقاء' }, type: 'default' },
            { id: 'aprire', label: 'APRIRE', icon: 'door-open', iconColor: 'text-amber-700', color: 'border-red-500', translations: { en: 'Open', ar: 'فتح' }, type: 'default' },
            { id: 'aiutami', label: 'AIUTAMI', icon: 'hand-helping', iconColor: 'text-orange-500', color: 'border-red-500', translations: { en: 'Help me', ar: 'ساعدني' }, type: 'default' },
            { id: 'mettere', label: 'METTERE', icon: 'box', iconColor: 'text-orange-600', color: 'border-gray-500', translations: { en: 'Put', ar: 'وضع' }, type: 'default' },
            { id: 'in', label: 'IN', icon: 'map-pin', iconColor: 'text-slate-500', color: 'border-slate-300', translations: { en: 'In', ar: 'في' }, type: 'default' },
            { id: 'adesso', label: 'ADESSO', icon: 'clock', iconColor: 'text-gray-700', color: 'border-red-500', translations: { en: 'Now', ar: 'الآن' }, type: 'default' },
            { id: 'dopo', label: 'DOPO', icon: 'arrow-right', iconColor: 'text-gray-700', color: 'border-green-500', translations: { en: 'After', ar: 'بعد' }, type: 'default' },
            { id: 'casa', label: 'CASA', icon: 'home', iconColor: 'text-red-500', color: 'border-slate-400', translations: { en: 'Home', ar: 'منzel' }, type: 'default' },
            { id: 'acqua', label: 'ACQUA', icon: 'droplets', iconColor: 'text-blue-500', color: 'border-red-500', translations: { en: 'Water', ar: 'ماء' }, type: 'default' },
            { id: 'dentista', label: 'DENTISTA', icon: 'stethoscope', iconColor: 'text-blue-600', color: 'border-green-500', translations: { en: 'Dentist', ar: 'طبيب الأسنان' }, type: 'default' },
            { id: 'montagna', label: 'MONTAGNA', icon: 'mountain', iconColor: 'text-teal-600', color: 'border-gray-500', translations: { en: 'Mountain', ar: 'جبل' }, type: 'default' },
            { id: 'mi-piace', label: 'MI PIACE', icon: 'thumbs-up', iconColor: 'text-green-500', color: 'border-gray-500', translations: { en: 'I like it', ar: 'يعجبني' }, type: 'default' },
            { id: 'non-mi-piace', label: 'NON MI PIACE', icon: 'thumbs-down', iconColor: 'text-red-500', color: 'border-black', translations: { en: "I don't like it", ar: 'لا يعجبني' }, type: 'default' },
            { id: 'non-bravo', label: 'NON BRAVO', icon: 'user-x', iconColor: 'text-red-600', color: 'border-gray-500', translations: { en: 'Not good', ar: 'ليس جيداً' }, type: 'default' },
            { id: 'non-toccare', label: 'NON TOCCARE', icon: 'ban', iconColor: 'text-pink-600', color: 'border-gray-500', translations: { en: "Don't touch", ar: 'لا تلمس' }, type: 'default' },
        ];

        /* =====================================================================
           URL helper per ottenere l'immagine di un pittogramma ARASAAC
           ===================================================================== */
        const getArasaacImageUrl = (pictogramId) =>
            `https://static.arasaac.org/pictograms/${pictogramId}/${pictogramId}_300.png`;

        function App() {
            const [language, setLanguage] = useState('en');
            const [sentence, setSentence] = useState([]);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [showInstallBanner, setShowInstallBanner] = useState(false);

            /* ---- Stato per la ricerca ARASAAC ---- */
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [searchError, setSearchError] = useState('');
            const searchTimerRef = useRef(null);

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setShowInstallBanner(true);
                });

                window.addEventListener('appinstalled', () => {
                    setShowInstallBanner(false);
                    setDeferredPrompt(null);
                    console.log('App installata!');
                });

                // Rileva se è già in modalità standalone
                if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
                    setShowInstallBanner(false);
                }
            }, []);

            const handleInstallClick = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('User accepted the install prompt');
                }
                setDeferredPrompt(null);
                setShowInstallBanner(false);
            };

            /* =================================================================
               RICERCA ARASAAC
               Quando l'utente digita nella barra di ricerca, aspettiamo 500 ms
               di pausa (debounce) prima di chiamare l'API, per evitare troppe
               richieste mentre si scrive.
               ================================================================= */
            const searchArasaac = useCallback(async (query) => {
                const trimmed = query.trim();
                if (!trimmed) {
                    setSearchResults([]);
                    setSearchError('');
                    return;
                }

                setIsSearching(true);
                setSearchError('');

                try {
                    const response = await fetch(
                        `https://api.arasaac.org/api/pictograms/it/search/${encodeURIComponent(trimmed)}`
                    );

                    if (!response.ok) {
                        if (response.status === 404) {
                            setSearchResults([]);
                            setSearchError('Nessun pittogramma trovato. Prova con un\'altra parola!');
                        } else {
                            throw new Error(`Errore API: ${response.status}`);
                        }
                        setIsSearching(false);
                        return;
                    }

                    const data = await response.json();

                    // Trasformiamo i risultati in un formato compatibile con la nostra app.
                    // Prendiamo solo i primi 30 risultati per non appesantire la pagina.
                    const symbols = data.slice(0, 30).map((item) => {
                        // La prima keyword è di solito la parola principale
                        const mainKeyword = item.keywords && item.keywords.length > 0
                            ? item.keywords[0].keyword
                            : trimmed;

                        return {
                            id: `arasaac-${item._id}`,
                            arasaacId: item._id,
                            label: mainKeyword.toUpperCase(),
                            imageUrl: getArasaacImageUrl(item._id),
                            color: 'border-blue-400',
                            // Per la sintesi vocale usiamo direttamente la keyword italiana
                            translations: {
                                en: mainKeyword,
                                ar: mainKeyword,
                                it: mainKeyword,
                            },
                            type: 'arasaac',
                        };
                    });

                    setSearchResults(symbols);
                    if (symbols.length === 0) {
                        setSearchError('Nessun pittogramma trovato. Prova con un\'altra parola!');
                    }
                } catch (err) {
                    console.error('Errore ricerca ARASAAC:', err);
                    setSearchError('Errore di connessione. Controlla la rete e riprova.');
                    setSearchResults([]);
                } finally {
                    setIsSearching(false);
                }
            }, []);

            /* Debounce: aspetta 500 ms dopo l'ultima digitazione */
            const handleSearchChange = (e) => {
                const value = e.target.value;
                setSearchQuery(value);

                if (searchTimerRef.current) clearTimeout(searchTimerRef.current);

                searchTimerRef.current = setTimeout(() => {
                    searchArasaac(value);
                }, 500);
            };

            /* Pulisci la ricerca */
            const clearSearch = () => {
                setSearchQuery('');
                setSearchResults([]);
                setSearchError('');
            };

            /* Funzione per la sintesi vocale gratuita del dispositivo */
            const speakText = (text) => {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                // Per i pittogrammi ARASAAC parliamo sempre in italiano
                utterance.lang = language === 'en' ? 'en-US' : language === 'ar' ? 'ar-SA' : 'it-IT';
                utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            };

            /* Aggiunge una parola alla striscia della frase */
            const addToSentence = (symbol) => {
                if (sentence.length < 10) {
                    setSentence([...sentence, symbol]);
                    // Per i pittogrammi ARASAAC leggiamo la keyword italiana
                    if (symbol.type === 'arasaac') {
                        speakText(symbol.translations.it || symbol.label);
                    } else {
                        speakText(symbol.translations[language]);
                    }
                }
            };

            /* Legge l'intera frase composta */
            const playFullSentence = () => {
                if (sentence.length === 0) return;
                const fullText = sentence.map(s => {
                    if (s.type === 'arasaac') return s.translations.it || s.label;
                    return s.translations[language];
                }).join(' ');
                setIsSpeaking(true);
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(fullText);
                utterance.lang = language === 'en' ? 'en-US' : language === 'ar' ? 'ar-SA' : 'it-IT';
                utterance.onend = () => setIsSpeaking(false);
                window.speechSynthesis.speak(utterance);
            };

            /* Decidiamo cosa mostrare nella griglia: risultati di ricerca oppure simboli predefiniti */
            const isSearchActive = searchQuery.trim().length > 0;
            const displayedSymbols = isSearchActive ? searchResults : DEFAULT_SYMBOLS;

            return (
                <div className="flex flex-col items-center min-h-screen pb-20">
                    {/* Banner Installazione */}
                    {showInstallBanner && (
                        <div className="w-full bg-blue-600 text-white p-3 flex justify-between items-center shadow-md animate-in slide-in-from-top duration-500">
                            <div className="flex items-center gap-3 ml-2">
                                <div className="p-1 bg-white/20 rounded-lg">
                                    <Icon name="download" color="text-white w-6 h-6" />
                                </div>
                                <span className="text-sm font-bold">Usa questa app senza browser!</span>
                            </div>
                            <div className="flex gap-2 mr-2">
                                <button 
                                    onClick={() => setShowInstallBanner(false)}
                                    className="px-3 py-1 text-xs opacity-70 font-bold uppercase"
                                >
                                    Dopo
                                </button>
                                <button 
                                    onClick={handleInstallClick}
                                    className="bg-white text-blue-600 px-4 py-2 rounded-xl text-xs font-black uppercase shadow-sm active:scale-95 transition-all"
                                >
                                    Installa Ora
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Barra Superiore per la costruzione della frase */}
                    <div className="w-full max-w-5xl bg-white border-b-4 border-slate-200 p-4 sticky top-0 z-50 shadow-sm flex items-center min-h-[140px]">
                        <div className="flex-1 flex flex-wrap gap-2 items-center min-h-[100px] overflow-y-auto px-2">
                            {sentence.length === 0 ? (
                                <div className="flex items-center gap-3 text-slate-300">
                                    <Icon name="message-square-plus" color="text-slate-200" />
                                    <span className="font-bold uppercase tracking-widest text-sm text-center">Tocca le immagini per parlare...</span>
                                </div>
                            ) : (
                                sentence.map((s, index) => (
                                    <div key={index} className="flex flex-col items-center p-2 bg-slate-50 border-2 border-slate-200 rounded-2xl scale-90 shadow-sm animate-in zoom-in">
                                        {/* Se il simbolo è ARASAAC mostriamo l'immagine, altrimenti l'icona Lucide */}
                                        {s.type === 'arasaac' ? (
                                            <img 
                                                src={s.imageUrl} 
                                                alt={s.label} 
                                                className="sentence-img"
                                                loading="lazy"
                                            />
                                        ) : (
                                            <Icon name={s.icon} color={s.iconColor} />
                                        )}
                                        <span className="text-[10px] font-black uppercase mt-1 truncate w-16 text-center">{s.label}</span>
                                    </div>
                                ))
                            )}
                        </div>
                        <div className="flex flex-col gap-3 ml-4">
                            <button 
                                onClick={playFullSentence} 
                                className="w-16 h-16 rounded-3xl bg-green-500 text-white shadow-lg flex items-center justify-center active:scale-90 disabled:opacity-50 transition-all"
                                title="Leggi tutto"
                            >
                                <Icon name="volume-2" color="text-white" />
                            </button>
                            <button 
                                onClick={() => setSentence([])} 
                                className="w-16 h-12 rounded-2xl bg-red-100 text-red-500 flex items-center justify-center active:scale-90 transition-all"
                                title="Cancella"
                            >
                                <Icon name="eraser" color="text-red-500" />
                            </button>
                        </div>
                    </div>

                    {/* Pannello di Controllo Lingua + Ricerca */}
                    <div className="w-full max-w-5xl px-4 py-8 flex flex-col gap-8">
                        <div className="flex justify-center">
                            <div className="flex bg-white p-1 rounded-3xl shadow-md border border-slate-200 w-full max-w-md">
                                <button 
                                    onClick={() => setLanguage('en')} 
                                    className={`flex-1 py-4 rounded-2xl font-black transition-all ${language === 'en' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}
                                >
                                    ENGLISH 🇺🇸
                                </button>
                                <button 
                                    onClick={() => setLanguage('ar')} 
                                    className={`flex-1 py-4 rounded-2xl font-black transition-all ${language === 'ar' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}
                                >
                                    العربية 🇦🇪
                                </button>
                            </div>
                        </div>

                        {/* =====================================================
                            BARRA DI RICERCA ARASAAC
                            Qui l'utente può digitare una parola in italiano.
                            Dopo 500 ms di pausa l'app interroga l'API ARASAAC
                            e mostra i pittogrammi trovati nella griglia sotto.
                            ===================================================== */}
                        <div className="w-full max-w-2xl mx-auto">
                            <div className="search-bar">
                                {/* Icona lente */}
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                    <circle cx="11" cy="11" r="8"/>
                                    <path d="m21 21-4.3-4.3"/>
                                </svg>

                                <input
                                    type="text"
                                    placeholder="Cerca pittogrammi ARASAAC..."
                                    value={searchQuery}
                                    onChange={handleSearchChange}
                                    autoComplete="off"
                                    id="arasaac-search"
                                />

                                {/* Pulsante per pulire la ricerca (visibile solo se c'è testo) */}
                                {searchQuery && (
                                    <button 
                                        onClick={clearSearch}
                                        className="p-1 rounded-full hover:bg-slate-100 active:scale-90 transition-all"
                                        title="Cancella ricerca"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                            <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
                                        </svg>
                                    </button>
                                )}
                            </div>

                            {/* Indicatore di stato della ricerca */}
                            {isSearching && (
                                <div className="flex items-center justify-center gap-2 mt-4 text-slate-400 font-bold text-sm">
                                    <span className="loading-dot"></span>
                                    <span className="loading-dot"></span>
                                    <span className="loading-dot"></span>
                                    <span className="ml-2">Cerco su ARASAAC...</span>
                                </div>
                            )}

                            {/* Messaggio di errore / nessun risultato */}
                            {searchError && !isSearching && (
                                <div className="mt-4 text-center text-slate-400 font-bold text-sm flex items-center justify-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                        <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
                                    </svg>
                                    {searchError}
                                </div>
                            )}

                            {/* Etichetta che indica cosa si sta mostrando */}
                            {isSearchActive && searchResults.length > 0 && !isSearching && (
                                <div className="mt-4 text-center text-blue-500 font-black text-xs uppercase tracking-widest">
                                    {searchResults.length} pittogrammi trovati per "{searchQuery.trim()}"
                                </div>
                            )}
                        </div>

                        {/* =====================================================
                            GRIGLIA DEI SIMBOLI
                            Mostra i risultati ARASAAC (con immagini reali) oppure
                            i simboli predefiniti (con icone Lucide) quando la 
                            ricerca è vuota.
                            ===================================================== */}
                        <div className="grid-container">
                            {displayedSymbols.map((symbol, idx) => (
                                <button 
                                    key={symbol.id} 
                                    onClick={() => addToSentence(symbol)} 
                                    className={`symbol-card fade-in-up flex flex-col items-center justify-center p-6 bg-white border-[6px] ${symbol.color} rounded-[3rem] shadow-sm hover:shadow-lg`}
                                    style={{ animationDelay: `${idx * 30}ms` }}
                                >
                                    {/* ARASAAC → immagine reale, Default → icona Lucide */}
                                    {symbol.type === 'arasaac' ? (
                                        <img 
                                            src={symbol.imageUrl} 
                                            alt={symbol.label} 
                                            className="pictogram-img"
                                            loading="lazy"
                                        />
                                    ) : (
                                        <Icon name={symbol.icon} color={symbol.iconColor} />
                                    )}
                                    <span className="text-sm font-black uppercase mt-4 tracking-tighter text-slate-800 leading-none">
                                        {symbol.label}
                                    </span>
                                </button>
                            ))}
                        </div>
                    </div>
                    
                    <footer className="mt-auto py-10 text-slate-300 font-bold text-[10px] uppercase tracking-[0.3em]">
                        Comunicatore CAA • Davide 
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
